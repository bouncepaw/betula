when:
  event: [tag]
  branch: ${CI_REPO_DEFAULT_BRANCH}

steps:
  build-publish:
    image: woodpeckerci/plugin-kaniko
    settings:
      repo: bouncepaw/betula
      platforms:
        - linux/arm/v7
        - linux/arm64/v8
        - linux/amd64
      tags:
        - ${CI_COMMIT_TAG}
        - latest
      username:
        from_secret: DOCKER_HUB_USERNAME
      password:
        from_secret: DOCKER_HUB_PASSWORD
